<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blossom Gesture Editor</title>
  </head>
  <body>
    <div id="pageContainer">
      <div id="outputPane">
        <div id="controls">
          <button id="resetBtn">Reset Robot</button>
          <button id="playBtn">Play Sequence</button>
          <button id="saveBtn">Save Sequence</button>
        </div>
        <pre id="generatedCode"><code></code></pre>
        <div id="savedSequences">
          <div id="savedHeader">
            <h3>Saved Sequences</h3>
            <button id="refreshBtn">Refresh</button>
          </div>
          <input
            type="text"
            id="sequenceSearch"
            placeholder="Search sequences..."
          />
          <ul id="sequenceList"></ul>
        </div>
      </div>
      <div id="blocklyDiv"></div>
    </div>
  </body>
</html>
